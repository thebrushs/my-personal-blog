
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1, h2 {
            color: #2c7a7b;
        }
        .post {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        .post h2 a {
            color: #2c7a7b;
            text-decoration: none;
        }
        .post-meta {
            color: #718096;
            font-size: 0.9rem;
        }
        .post-excerpt {
            margin-top: 10px;
            color: #4a5568;
        }
        footer {
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
            color: #718096;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Blog</h1>
        <p>Welcome to my personal blog</p>
    </header>
    
    <main>
        
        <div class="post">
            <h2><a href="/posts/hello-world.html">Hello World</a></h2>
            <div class="post-meta">
                2026-03-01 | Jimmy
            </div>
            <div class="post-excerpt">
                # Hello World

This is my first blog post generated by the static site generator.

## Features

- **Markdown support**: Write content in Markdown for...
            </div>
        </div>
        
    </main>
    
    <footer>
        <p>&copy; 2026 My Blog</p>
    </footer>
</body>
</html>
